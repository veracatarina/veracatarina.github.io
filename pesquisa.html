<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados da Busca – Advocacia Vera Catarina</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; padding: 40px 20px; max-width: 800px; margin: 0 auto; }
    h1 { font-family: 'Cinzel', serif; color: #0b251e; }
    .search-box { display: flex; gap: 10px; margin: 20px 0; }
    .search-box input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 1rem; }
    .search-box button { background: #0b251e; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; }
    .search-box button:hover { background: #143d33; }
    .result-frame { width: 100%; height: 600px; border: 1px solid #e2e8f0; border-radius: 8px; }
    .back-link { display: inline-block; margin-top: 20px; color: #c5a880; text-decoration: none; }
  </style>
</head>
<body>
  <h1><i class="fas fa-search" style="color: #c5a880;"></i> Resultados da Busca</h1>
  <form class="search-box" action="/pesquisa.html" method="get">
    <input type="search" name="q" placeholder="Digite o que você procura..." value="{{q}}">
    <button type="submit"><i class="fas fa-search"></i> Buscar</button>
  </form>
  <iframe class="result-frame" src="https://www.google.com/search?q=site:veracatarina.github.io {{q}}&igu=1" title="Resultados da busca"></iframe>
  <br>
  <a href="/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar para o início</a>
  <script>
    // Preenche o campo de busca com o termo da URL
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      document.querySelector('input[name="q"]').value = q;
      document.querySelector('iframe').src = 'https://www.google.com/search?q=site:veracatarina.github.io ' + encodeURIComponent(q) + '&igu=1';
    }
  </script>
</body>
</html>
